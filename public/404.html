<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Save the current URL to sessionStorage and redirect to root
      // so React Router can handle the route on the main page load
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'">
  </head>
  <body></body>
</html>
